<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>React To‑Do</title>
  <style>
    /* Minimal styling so it looks neat without CSS files */
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #f6f7fb; color: #1f2937; }
    .container { max-width: 720px; margin: 48px auto; background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,.06); }
    h1 { margin: 0 0 16px; font-size: 28px; }
    .subtitle { color: #6b7280; margin-bottom: 24px; }
    .row { display: flex; gap: 12px; }
    input[type="text"] { flex: 1; padding: 12px 14px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 16px; }
    button.primary { background: #4f46e5; color: white; border: none; padding: 12px 16px; border-radius: 10px; cursor: pointer; }
    button.primary:hover { background: #4338ca; }
    ul { list-style: none; padding: 0; margin-top: 20px; }
    .empty { color: #9ca3af; text-align: center; padding: 20px; }
    .filters { display: flex; gap: 8px; margin-top: 14px; }
    .chip { padding: 6px 10px; border-radius: 999px; background: #f3f4f6; cursor: pointer; font-size: 13px; border: 1px solid transparent; }
    .chip.active { background: #eef2ff; color: #3730a3; border-color: #c7d2fe; }
    .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; color: #6b7280; font-size: 14px; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
